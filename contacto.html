<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sabores del campo / Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/bootstrap.min.css">
  </head>
 <body>
    <!-- MAPA DE NAVEGACIÓN -->
    <div id="navbar"></div> 

    <!-- contenico -->
    <form action="">
      <div class="container mt-5 mb-5 mt-5 w-80 shadow-lg p-4 rounded" style="min-height: 58vh;">
     <h2 class="text-center mb-4">Contáctanos </h2>
      <form action="" method="">
       <div class="mb-3">
          <label for="nombre" class="form-label">Nombre:</label>
          <input type="text" id="nombre" class="form-control" name="nombre">
       </div> 
       <div class="mb-3">
          <label for="correo" class="form-label">Correo:</label>
          <input type="email" id="correo" class="form-control" name="correo">
        </div> 
        <div class="mb-3">
         <label for="mensaje" class="form-label">Mensaje:</label>
          <textarea name="mensaje" id="mensaje" class="form-control" row="4"></textarea>
        </div> 
        <button type="button" class="btn btn-primary mb-3" onclick="contactar ()"> Enviar</button>
        <input type="reset" value="limpiar" class="btn btn-secondary  mb-3">
      </form>
    </div>

    </form>
    

    <!-- footer  -->
     <footer class="bg-primary-subtle text-clack text-center py-4 mt-5">
        <div id="footer"></div>
     </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/barra.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/contacto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>

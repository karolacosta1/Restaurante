<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    <!-- MAPA DE NAVEGACIÓN -->
    <div id="navbar"></div>

     <!-- contenico -->
<form claction="">
    <div class="container mb-5 mt-5 w-80 shadow-lg p-4 rounded " >
         <h2 class="text-center mb-4">Reserva tu mesa </h2>
         <p class="text-center text-muted">Completa el formulario y te confirmaremos tu reserva</p>
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo:</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: Karol Dayana Acosta Laguna">
            </div>
            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico:</label>
                <input type="email" id="correo" class="form-control" placeholder="Ej: Karol@gmail.com">
            </div> 
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha de reserva:</label>
                <input type="date" id="fecha" class="form-control">
            </div> 
            <div class="mb-3">
                <label for="hora" class="form-label">Hora:</label>
                <input type="time" id="hora" class="form-control">
            </div> 
             <div class="mb-3">
                <label for="numero" class="form-label">Número de personas:</label>
                <select class="form-select" aria-label="Default select example" class="form-control" id="personas">
                 <option selected></option>
                 <option value="1">1</option>
                 <option value="2">2</option>
                 <option value="3">3</option>
                 <option value="4">4</option>
                 <option value="5">5</option>
                 <option value="6">+6</option>
                </select>
            </div> 
            <button type="button" class="btn btn-primary form-control mb-3" onclick="reservar()"> Enviar</button>
    </div>
</form>

          
<!-- footer  -->
<footer class="bg-primary-subtle text-white text-center  mt-5">
    <div id="footer"></div>
</footer>




   
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/barra.js"></script>
<script src="js/footer.js"></script>
<script src="js/reserva.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
